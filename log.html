<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <main>
        <section>
            <div>
                <h2>Login</h2>
            </div>
            <div>
                <form action="main.html" method="get">
                    <div class="input-box">
                        <input type="text" placeholder="Nome">
                    </div>
                    <div class="input-box">
                        <input type="password" placeholder="Senha">
                    </div>
                    <button type="submit">Login</button>
                </form>
            </div>
        </section>
    </main>


    <script>
        const loginButton = document.querySelector('button');
        loginButton.addEventListener('click', function () {
            const username = document.querySelector('input[type="text"]');
            const password = document.querySelector('input[type="password"]');
            if (username.value === 'max' && password.value === '1234') {
                alert('Login bem-sucedido!');
                window.location.href = 'main.html';
            } else {
                alert('Credenciais inválidas. Tente novamente.');
            }
        });
        console.log('Script de login carregado com sucesso.');

    </script>

</body>

</html>

<style>
    *{
        margin: 0;
        padding: 0;
    }
    main{
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        flex-direction: column;
        height: 100vh;
        background-image: url(./img/tsushima.gif);
        background-size: cover;
        background-position: center;
    }

    h2 {
        color: rgb(66, 33, 96);
        font-family:Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        font-size: 4vh;
        margin-bottom: 27px;
        
    }
    section{
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: rgba(255, 237, 255, 0.349);
        border-radius: 12px;
        width: 300px;
        height: 300px;
        backdrop-filter: blur(5px);
    }

    form {
        
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        
    }

    .input-box {
        margin-bottom: 13px;
        color: sandybrown;

    }

    .input-box input {
        padding: 10px;
        width: 200px;
        height: 30px;
        border: 1px solid #bcb9b9;
        border-radius: 7px;
    }

    button {
        cursor: pointer;
        padding: auto;
        width: 85px;
        height: 35px;
        background-color: rgb(239, 219, 239);
        border: 1px solid #ccc;
        border-radius: 7px;
        color: rgb(106, 92, 74);
        margin-top: 6px;
    }

    button:hover {
        background-color: rgb(231, 208, 231);
        border: 1px solid #ccc;
        border-radius: 7px;
        color: rgb(106, 92, 74);
        transform: scale(1.1);
        transition: transform 0.3s ease;
    }

    button:active {
        background-color: rgb(231, 208, 231);
        border: 1px solid #ccc;
        border-radius: 7px;
        color: rgb(106, 92, 74);
        transform: scale(0.9);
        transition: transform 0.3s ease;
    }

    .input-box input:focus {
        border-color: rgb(112, 80, 142);
        outline: none;
        transition: border-color 0.3s ease;
    }
    .titulo {
        position: absolute;
        top: 20%;
        left: 50%;
        transform: translate(-50%, -50%);
    }
</style>
