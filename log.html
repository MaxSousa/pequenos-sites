<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div class="titulo">
        <h1>Bem-vindo ao meu site de login!</h1>
        <p>Faça login para acessar meu mini portfolio!</p>
    </div>
    <div class="form-container">
        <h2>login</h2>
        <div class="input-box">
            <input type="text" placeholder="Nome de usuário">
        </div>
        <div class="input-box">
            <input type="password" placeholder="Senha">
        </div>
        <button>Login</button>
    </div>


    <script>
        const loginButton = document.querySelector('button');
        loginButton.addEventListener('click', function () {
            const username = document.querySelector('input[type="text"]');
            const password = document.querySelector('input[type="password"]');
            if (username.value === 'max' && password.value === '1234') {
                alert('Login bem-sucedido!');
                window.location.href = 'main.html';
            } else {
                alert('Credenciais inválidas. Tente novamente.');
            }
        });
        console.log('Script de login carregado com sucesso.');

    </script>

</body>

</html>

<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: rgb(246, 214, 175);
        text-align: center;
    }
    h1{
        color: rgb(83, 53, 111);
    }
    p{
        color: rgb(0, 0, 0);
        font-size: 18px;
    }

    h2 {
        color: rgb(109, 92, 125);
        font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif
    }

    .form-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        background-color: white;
        padding: 20px;
        border-radius: 15px;
    }

    .input-box {
        margin-bottom: 13px;
        color: sandybrown;

    }

    .input-box input {
        padding: 10px;
        width: 200px;
        border: 1px solid #bcb9b9;
        border-radius: 7px;
    }

    button {
        cursor: pointer;
        padding: auto;
        width: 65px;
        height: 27px;
        background-color: rgb(239, 219, 239);
        border: 1px solid #ccc;
        border-radius: 7px;
        color: rgb(106, 92, 74);
    }

    button:hover {
        background-color: rgb(231, 208, 231);
        border: 1px solid #ccc;
        border-radius: 7px;
        color: rgb(106, 92, 74);
        transform: scale(1.1);
        transition: transform 0.3s ease;
    }

    button:active {
        background-color: rgb(231, 208, 231);
        border: 1px solid #ccc;
        border-radius: 7px;
        color: rgb(106, 92, 74);
        transform: scale(0.9);
        transition: transform 0.3s ease;
    }

    .input-box input:focus {
        border-color: rgb(112, 80, 142);
        outline: none;
        transition: border-color 0.3s ease;
    }
    .titulo {
        position: absolute;
        top: 20%;
        left: 50%;
        transform: translate(-50%, -50%);
    }
</style>
